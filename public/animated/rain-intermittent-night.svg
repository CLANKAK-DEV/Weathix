<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewbox="0 0 64 64">
    <defs>
        <style type="text/css"><![CDATA[
            @keyframes am-weather-moon {
                0% { transform: rotate(0deg); }
                50% { transform: rotate(15deg); }
                100% { transform: rotate(0deg); }
            }
            .am-weather-moon {
                animation-name: am-weather-moon;
                animation-duration: 6s;
                animation-timing-function: linear;
                animation-iteration-count: infinite;
                transform-origin: 12.5px 15.15px;
            }
            @keyframes am-weather-rain {
                0% { stroke-dashoffset: 0; }
                100% { stroke-dashoffset: -20; }
            }
            .am-weather-rain-line {
                animation-name: am-weather-rain;
                animation-duration: 2s;
                animation-timing-function: linear;
                animation-iteration-count: infinite;
            }
        ]]></style>
    </defs>
    <g transform="translate(20,10)">
        <g transform="translate(16,4), scale(0.8)">
            <g class="am-weather-moon">
                <path d="M14.5,13.2c0-3.7,2-6.9,5-8.7c-1.5-0.9-3.2-1.3-5-1.3c-5.5,0-10,4.5-10,10s4.5,10,10,10c1.8,0,3.5-0.5,5-1.3C16.5,20.2,14.5,16.9,14.5,13.2z" fill="#FAD02C" stroke="#FAD02C" stroke-linejoin="round" stroke-width="2"/>
            </g>
        </g>
        <g>
            <path d="M47.7,35.4c0-4.6-3.7-8.2-8.2-8.2c-1,0-1.9,0.2-2.8,0.5c-0.3-3.4-3.1-6.2-6.6-6.2c-3.7,0-6.7,3-6.7,6.7c0,0.8,0.2,1.6,0.4,2.3c-0.3-0.1-0.7-0.1-1-0.1c-3.7,0-6.7,3-6.7,6.7c0,3.6,2.9,6.6,6.5,6.7l17.2,0C44.2,43.3,47.7,39.8,47.7,35.4z" fill="#E0E0E0" stroke="white" stroke-linejoin="round" stroke-width="1.2" transform="translate(-20,-11)"/>
        </g>
    </g>
    <g transform="translate(32,40), rotate(10)">
        <line class="am-weather-rain-line" fill="none" stroke="#57A0EE" stroke-dasharray="2,4" stroke-linecap="round" stroke-width="2" x1="0" x2="0" y1="0" y2="10" />
    </g>
</svg>
