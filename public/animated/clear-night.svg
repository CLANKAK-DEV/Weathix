<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewbox="0 0 64 64">
    <defs>
        <style type="text/css"><![CDATA[
            @keyframes am-weather-moon {
                0% { transform: rotate(0deg); }
                50% { transform: rotate(15deg); }
                100% { transform: rotate(0deg); }
            }
            .am-weather-moon {
                animation-name: am-weather-moon;
                animation-duration: 6s;
                animation-timing-function: linear;
                animation-iteration-count: infinite;
                transform-origin: 12.5px 15.15px;
            }
            @keyframes am-weather-star {
                0% { opacity: 0.3; transform: scale(0.8); }
                50% { opacity: 1; transform: scale(1.1); }
                100% { opacity: 0.3; transform: scale(0.8); }
            }
            .am-weather-star {
                animation-name: am-weather-star;
                animation-duration: 4s;
                animation-timing-function: linear;
                animation-iteration-count: infinite;
            }
        ]]></style>
    </defs>
    <g transform="translate(20,20)">
        <g class="am-weather-star" transform="translate(5, -5)">
            <polygon fill="#FAD02C" points="3.3,1.5 4,2.7 5.2,3.3 4,4 3.3,5.2 2.7,4 1.5,3.3 2.7,2.7" />
        </g>
        <g class="am-weather-star" style="animation-delay: 2s;" transform="translate(25, 10)">
            <polygon fill="#FAD02C" points="3.3,1.5 4,2.7 5.2,3.3 4,4 3.3,5.2 2.7,4 1.5,3.3 2.7,2.7" />
        </g>
        <g class="am-weather-moon">
            <path d="M14.5,13.2c0-3.7,2-6.9,5-8.7c-1.5-0.9-3.2-1.3-5-1.3c-5.5,0-10,4.5-10,10s4.5,10,10,10c1.8,0,3.5-0.5,5-1.3C16.5,20.2,14.5,16.9,14.5,13.2z" fill="#FAD02C" stroke="#FAD02C" stroke-linejoin="round" stroke-width="2"/>
        </g>
    </g>
</svg>
